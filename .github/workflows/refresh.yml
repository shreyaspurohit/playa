name: Refresh camps directory

# Repo is public; scraped camp data is NOT committed (see .gitignore).
# Every run scrapes fresh on the ephemeral runner, builds the site, and
# deploys via actions/upload-pages-artifact — data never lands in git.

on:
  schedule:
    # 08:00 UTC daily (≈ 01:00 PT / 00:00 PST).
    - cron: '0 8 * * *'
  workflow_dispatch:  # "Actions → Refresh camps directory → Run workflow"

permissions:
  contents: read

# Opt JS actions into Node 24 runtime. Needed for actions/upload-pages-artifact@v3
# and actions/deploy-pages@v4 which are GitHub's latest majors but still declare
# Node 20 in action.yml as of Apr 2026. When those ship a new major with
# runs.using: node24 natively, this env var becomes redundant and can be dropped.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: refresh-camps
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # openssl + bash + xargs ship with ubuntu-latest; nothing to install.
      # (We shell out to openssl at build time for the encrypted payload.)
      - name: Verify build prerequisites
        run: |
          openssl version
          python3 --version

      - name: Scrape + build site
        env:
          # Pulled from repo secrets. Blank → plaintext build with the
          # placeholder email. Set both before the first real deploy.
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
        run: python3 -m bm_camps all

      # Uploads site/ (index.html + CNAME + robots.txt + .nojekyll) from
      # the runner filesystem as the github-pages artifact. Also visible
      # in the Actions run UI if you need to inspect the built HTML.
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
