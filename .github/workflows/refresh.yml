name: Refresh camps directory

# Repo is public; fetched camp data is NOT committed (see .gitignore).
# Every run fetches fresh on the ephemeral runner, builds the site, and
# deploys via actions/upload-pages-artifact — data never lands in git.

on:
  schedule:
    # 08:00 UTC daily (≈ 01:00 PT / 00:00 PST).
    - cron: '0 8 * * *'
  workflow_dispatch:  # "Actions → Refresh camps directory → Run workflow"

permissions:
  contents: read

concurrency:
  group: refresh-camps
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        run: npm ci
        working-directory: client

      - name: Install backend (editable)
        run: pip install -e ./backend

      - name: Python unit tests
        run: python3 -m unittest discover -s backend/tests -v

      - name: TypeScript type-check
        run: npm run typecheck
        working-directory: client

      - name: JS unit tests
        run: npm test
        working-directory: client

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      # openssl + bash + xargs ship with ubuntu-latest; nothing to install.
      # (We shell out to openssl at build time for the encrypted payload.)
      - name: Verify build prerequisites
        run: |
          openssl version
          python3 --version
          node --version

      - name: Install client deps
        run: npm ci
        working-directory: client

      - name: Install backend (editable)
        run: pip install -e ./backend

      - name: Build client bundle
        run: npm run build
        working-directory: client

      - name: Fetch + build site
        env:
          # Pulled from repo secrets. Blank → plaintext build with the
          # placeholder email. Set both before the first real deploy.
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
        run: python3 -m playa all

      # Uploads site/ (index.html + CNAME + robots.txt + .nojekyll) from
      # the runner filesystem as the github-pages artifact. Also visible
      # in the Actions run UI if you need to inspect the built HTML.
      # include-hidden-files preserves site/.nojekyll (v4+ strips dotfiles
      # by default) — without it, Pages will try to Jekyll-process the site.
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/
          include-hidden-files: true

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
