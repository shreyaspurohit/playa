name: Refresh camps directory

# Repo is public; fetched camp data is NOT committed (see .gitignore).
# Every run fetches fresh on the ephemeral runner, builds the site, and
# deploys via actions/upload-pages-artifact — data never lands in git.
#
# api.burningman.org sources (api-YYYY) are cached as ENCRYPTED GitHub
# Release assets — see docs/15-data-sources.md decision D7. The cache
# step downloads the asset if a release tag exists, otherwise hits the
# API once + uploads. Past-year builds therefore stop costing API calls
# after the first run.

on:
  schedule:
    # 08:00 UTC daily (≈ 01:00 PT / 00:00 PST).
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      burn_open:
        description: 'Spirit-mode auto-unlock override'
        required: false
        type: choice
        default: ''
        options: ['', 'force-open', 'force-closed']
      refresh_api_years:
        description: 'Years to force-refresh (e.g. 2026 or 2025,2026)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: refresh-camps
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        run: npm ci
        working-directory: client

      - name: Install backend (editable)
        run: pip install -e ./backend

      - name: Python unit tests
        run: python3 -m unittest discover -s backend/tests -v

      - name: TypeScript type-check
        run: npm run typecheck
        working-directory: client

      - name: JS unit tests
        run: npm test
        working-directory: client

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # `contents: write` is required so the API-cache step can create
    # / upload to GitHub Releases. Pages still uses its own dedicated
    # job below with the narrower `pages: write`.
    permissions:
      contents: write
    steps:
      # fetch-depth: 200 so the builder's `git log` can collect any
      # `rn:` commits authored since the user's last visit. Default
      # of 1 would give zero history → empty release-notes list.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 200

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      # openssl + bash + gh ship with ubuntu-latest. We shell out to
      # openssl for the deployed-site payload AND the API cache
      # (encrypted at fetch time, decrypted at build time).
      - name: Verify build prerequisites
        run: |
          openssl version
          python3 --version
          node --version
          gh --version

      - name: Install client deps
        run: npm ci
        working-directory: client

      - name: Install backend (editable)
        run: pip install -e ./backend

      - name: Build client bundle
        run: npm run build
        working-directory: client

      # ===============================================================
      # Optional pre-step: delete specific years' Releases so the
      # cache step below sees a miss and re-fetches.
      #
      # Triggered only when `inputs.refresh_api_years` is set on a
      # `workflow_dispatch` run — e.g., '2026' to grab a fresh
      # current-year snapshot mid-week, or '2025,2026' for both.
      # Nightly cron runs leave caches alone (no extra API hits).
      # ===============================================================
      - name: Force-refresh selected API year caches
        if: github.event_name == 'workflow_dispatch' && inputs.refresh_api_years != ''
        env:
          REFRESH_YEARS: ${{ inputs.refresh_api_years }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          IFS=',' read -ra YEARS <<< "$REFRESH_YEARS"
          for raw in "${YEARS[@]}"; do
            year="$(echo "$raw" | tr -d '[:space:]')"
            [ -z "$year" ] && continue
            tag="data-api-${year}"
            echo "::group::force-refresh ${tag}"
            if gh release view "$tag" >/dev/null 2>&1; then
              gh release delete "$tag" --yes
              # Also drop the underlying tag so a clean release-create
              # works on the upload step (gh keeps the tag around even
              # after `release delete` unless --cleanup-tag is used,
              # but explicit is more portable across gh versions).
              git push --delete origin "$tag" 2>/dev/null || true
              echo "deleted release ${tag}; cache step will re-fetch"
            else
              echo "no existing release ${tag}; cache step will fetch fresh"
            fi
            echo "::endgroup::"
          done

      # ===============================================================
      # API source caches.
      #
      # For each year in `vars.BM_API_YEARS` (repo-level variable, e.g.
      # "2025,2026"), try to download the encrypted cache from the
      # `data-api-<year>` Release. Cache miss → fetch from
      # api.burningman.org once, encrypt, attach as the Release asset.
      #
      # To force a re-fetch for a year (e.g., a corrected dataset
      # mid-year): use the `refresh_api_years` workflow_dispatch
      # input (above) — it deletes the Release(s) before this step
      # runs. Manual alternative: `gh release delete data-api-2025
      # --yes` and re-run the workflow.
      # ===============================================================
      - name: Refresh API source caches
        env:
          BM_API_KEY: ${{ secrets.BM_API_KEY }}
          BM_CACHE_PASSWORD: ${{ secrets.BM_CACHE_PASSWORD }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
          BM_API_YEARS: ${{ vars.BM_API_YEARS }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${BM_API_YEARS:-}" ]; then
            echo "BM_API_YEARS unset — directory-only build, skipping API cache."
            exit 0
          fi
          mkdir -p data/api
          # Encrypted writes use BM_CACHE_PASSWORD with SITE_PASSWORD
          # fallback (matches Config.effective_cache_password).
          : "${BM_CACHE_PASSWORD:=${SITE_PASSWORD:-}}"
          export BM_CACHE_PASSWORD
          if [ -z "${BM_CACHE_PASSWORD:-}" ]; then
            echo "::error ::Neither BM_CACHE_PASSWORD nor SITE_PASSWORD set; refusing to upload plaintext cache assets to a public release. Set one before re-running."
            exit 1
          fi
          IFS=',' read -ra YEARS <<< "$BM_API_YEARS"
          for year_raw in "${YEARS[@]}"; do
            year="$(echo "$year_raw" | tr -d '[:space:]')"
            [ -z "$year" ] && continue
            tag="data-api-${year}"
            asset="${year}.bin"
            out="data/api/${year}.json"
            echo "::group::api-${year}"
            if gh release download "$tag" --pattern "$asset" --output "$out" 2>/dev/null; then
              echo "cache hit: pulled ${asset} from release ${tag}"
            else
              echo "cache miss for ${tag} — fetching from api.burningman.org"
              if [ -z "${BM_API_KEY:-}" ]; then
                echo "::error ::BM_API_KEY not set; cannot fetch year ${year}. Add the secret or remove the year from BM_API_YEARS."
                exit 1
              fi
              python3 -m playa api-fetch --year "${year}"
              # Idempotent release create.
              if ! gh release view "$tag" >/dev/null 2>&1; then
                gh release create "$tag" \
                  --title "API cache ${year}" \
                  --notes "Encrypted api.burningman.org cache for ${year}. AES-256-CBC + PBKDF2 via openssl. See docs/15-data-sources.md decision D7. Delete this release to force a re-fetch on the next workflow run."
              fi
              gh release upload "$tag" "${out}#${asset}" --clobber
              echo "uploaded ${asset} to release ${tag}"
            fi
            echo "::endgroup::"
          done

      # ===============================================================
      # ADR D13: resolve `BURN_OPEN` for the build step.
      #
      # Order of precedence:
      #   1. workflow_dispatch input (`force-open` / `force-closed`)
      #      always wins — operator override.
      #   2. After BURN_WINDOW_OPEN_TO: BURN_OPEN=0 ALWAYS. Spirit
      #      requires the password again — even PLAYA_GO_LIVE can't
      #      override a closed burn (the operator's "we're done" signal).
      #   3. Inside [BURN_WINDOW_OPEN_FROM, BURN_WINDOW_OPEN_TO]:
      #      BURN_OPEN=1.
      #   4. Before BURN_WINDOW_OPEN_FROM but `vars.PLAYA_GO_LIVE`
      #      is truthy: BURN_OPEN=1 (early go-live for spirit-mode).
      #      Note: locations stay hidden until `BURN_WINDOW_OPEN_FROM`
      #      regardless — only the password gate is bypassed early.
      #   5. Default: BURN_OPEN=0 (closed). Site builds normally.
      #
      # Comparison is done in UTC at day granularity. Worst-case
      # boundary skew is ~7h vs Black-Rock midnight, which is
      # operationally fine — the cron only runs once a day anyway.
      # ===============================================================
      - name: Resolve BURN_OPEN from date window
        env:
          DISPATCH_INPUT: ${{ inputs.burn_open }}
          BURN_WINDOW_OPEN_FROM: ${{ vars.BURN_WINDOW_OPEN_FROM }}
          BURN_WINDOW_OPEN_TO: ${{ vars.BURN_WINDOW_OPEN_TO }}
          PLAYA_GO_LIVE: ${{ vars.PLAYA_GO_LIVE }}
        run: |
          set -euo pipefail
          effective=0
          today_utc="$(date -u +%Y-%m-%d)"

          if [[ "$DISPATCH_INPUT" == "force-open" ]]; then
            effective=1
            echo "burn-window: dispatch input force-open → BURN_OPEN=1"
          elif [[ "$DISPATCH_INPUT" == "force-closed" ]]; then
            effective=0
            echo "burn-window: dispatch input force-closed → BURN_OPEN=0"
          elif [[ -n "${BURN_WINDOW_OPEN_FROM:-}" && -n "${BURN_WINDOW_OPEN_TO:-}" ]]; then
            if [[ "$today_utc" > "$BURN_WINDOW_OPEN_TO" ]]; then
              # Past TO — definitively closed. PLAYA_GO_LIVE doesn't
              # override; if you want to extend, bump BURN_WINDOW_OPEN_TO.
              effective=0
              echo "burn-window: today=${today_utc} past TO=${BURN_WINDOW_OPEN_TO} → BURN_OPEN=0 (password mode resumed)"
            elif [[ "$today_utc" >= "$BURN_WINDOW_OPEN_FROM" ]]; then
              effective=1
              echo "burn-window: today=${today_utc} inside [${BURN_WINDOW_OPEN_FROM}, ${BURN_WINDOW_OPEN_TO}] → BURN_OPEN=1"
            elif [[ -n "${PLAYA_GO_LIVE:-}" && "${PLAYA_GO_LIVE,,}" != "0" \
                    && "${PLAYA_GO_LIVE,,}" != "false" \
                    && "${PLAYA_GO_LIVE,,}" != "no" ]]; then
              effective=1
              echo "burn-window: today=${today_utc} pre-FROM but PLAYA_GO_LIVE=${PLAYA_GO_LIVE} → BURN_OPEN=1 (early go-live; locations still embargoed until ${BURN_WINDOW_OPEN_FROM})"
            else
              effective=0
              echo "burn-window: today=${today_utc} before FROM=${BURN_WINDOW_OPEN_FROM}, no PLAYA_GO_LIVE → BURN_OPEN=0"
            fi
          elif [[ -n "${PLAYA_GO_LIVE:-}" && "${PLAYA_GO_LIVE,,}" != "0" \
                  && "${PLAYA_GO_LIVE,,}" != "false" \
                  && "${PLAYA_GO_LIVE,,}" != "no" ]]; then
            # No window vars set, but operator forced go-live.
            effective=1
            echo "burn-window: vars unset, PLAYA_GO_LIVE=${PLAYA_GO_LIVE} → BURN_OPEN=1"
          else
            echo "burn-window: vars unset, no dispatch input, no PLAYA_GO_LIVE → BURN_OPEN=0 (closed)"
          fi
          echo "BURN_OPEN=${effective}" >> "$GITHUB_ENV"

      - name: Fetch + build site
        env:
          # Pulled from repo secrets. Blank → plaintext build with the
          # placeholder email. Set both before the first real deploy.
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          # Burn-week dates — REQUIRED. One pair drives all calendar
          # edges + public-access window + location-embargo cutoff
          # (see Config.burn_start / burn_end). No code-side default;
          # if the operator hasn't set these repo vars, the build
          # fails loud rather than producing a site with stale dates.
          BURN_WINDOW_OPEN_FROM: ${{ vars.BURN_WINDOW_OPEN_FROM }}
          BURN_WINDOW_OPEN_TO: ${{ vars.BURN_WINDOW_OPEN_TO }}
          # API source plumbing. BM_API_YEARS drives both the cache
          # step above AND `_resolve_sources()` in playa.cli — the
          # same value picks the years to fetch and the years to
          # embed in the site.
          BM_API_KEY: ${{ secrets.BM_API_KEY }}
          BM_CACHE_PASSWORD: ${{ secrets.BM_CACHE_PASSWORD }}
          BM_API_YEARS: ${{ vars.BM_API_YEARS }}
          # D10 multi-tier passwords + source manifest. Operator
          # composes SITE_TIERS from the per-tier secrets so literal
          # passwords don't sit in the workflow YAML.
          SITE_TIERS: ${{ secrets.SITE_TIERS }}
          # BURN_OPEN comes from $GITHUB_ENV via the Resolve step
          # above (D13). The Python builder reads it directly.
        run: python3 -m playa all

      # Uploads site/ (index.html + CNAME + robots.txt + .nojekyll) from
      # the runner filesystem as the github-pages artifact. Also visible
      # in the Actions run UI if you need to inspect the built HTML.
      # include-hidden-files preserves site/.nojekyll (v4+ strips dotfiles
      # by default) — without it, Pages will try to Jekyll-process the site.
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/
          include-hidden-files: true

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
