<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="googlebot" content="noindex, nofollow, noarchive">
<!-- Scrape metadata — consumed by the Preact client at startup. -->
<meta name="bm-version" content="__VERSION__">
<meta name="bm-scraped-date" content="__SCRAPED_DATE__">
<meta name="bm-scraped-at" content="__SCRAPED_AT__">
<meta name="bm-contact-email" content="__CONTACT_EMAIL__">
<title>Burning Man Camps</title>
<style>
  /* Themes are sorted brightest -> darkest. Pick via data-theme on <html>. */
  :root,
  :root[data-theme="paper"] {
    --bg: #faf7f2;
    --card: #ffffff;
    --border: #e6dfd4;
    --text: #1a1a1a;
    --muted: #6b6256;
    --accent: #c2410c;
    --accent-soft: #fde7d7;
    --chip-bg: #f1ece3;
    --chip-active-bg: #c2410c;
    --chip-active-text: #ffffff;
    --mark-bg: #fde7d7;
    --mark-text: #c2410c;
    --header-bg: linear-gradient(180deg, #ffffff, #faf7f2);
  }
  :root[data-theme="daylight"] {
    --bg: #ffffff;
    --card: #f7f7f8;
    --border: #e3e3e6;
    --text: #0a0a0a;
    --muted: #5f5f63;
    --accent: #ea580c;
    --accent-soft: #ffedd5;
    --chip-bg: #eeeef0;
    --chip-active-bg: #ea580c;
    --chip-active-text: #ffffff;
    --mark-bg: #ffedd5;
    --mark-text: #ea580c;
    --header-bg: #ffffff;
  }
  :root[data-theme="dusk"] {
    --bg: #2b231c;
    --card: #3a3028;
    --border: #544739;
    --text: #ead9bf;
    --muted: #a6988a;
    --accent: #fb923c;
    --accent-soft: #5a3e2a;
    --chip-bg: #483c30;
    --chip-active-bg: #fb923c;
    --chip-active-text: #1a1410;
    --mark-bg: #5a3e2a;
    --mark-text: #fdba74;
    --header-bg: linear-gradient(180deg, #3a3028, #2b231c);
  }
  :root[data-theme="night"] {
    --bg: #161618;
    --card: #1f1f24;
    --border: #2e2e36;
    --text: #e6e6ea;
    --muted: #9897a0;
    --accent: #fb923c;
    --accent-soft: #3a2a1c;
    --chip-bg: #2a2a32;
    --chip-active-bg: #fb923c;
    --chip-active-text: #161618;
    --mark-bg: #3a2a1c;
    --mark-text: #fdba74;
    --header-bg: linear-gradient(180deg, #1f1f24, #161618);
  }
  :root[data-theme="eclipse"] {
    --bg: #000000;
    --card: #0a0a0e;
    --border: #1c1c24;
    --text: #e8e8ec;
    --muted: #888890;
    --accent: #fb923c;
    --accent-soft: #2a1f14;
    --chip-bg: #14141a;
    --chip-active-bg: #fb923c;
    --chip-active-text: #000000;
    --mark-bg: #2a1f14;
    --mark-text: #fdba74;
    --header-bg: #050508;
  }
  html { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 15px; line-height: 1.45; }
  /* site-chrome wraps the header + search + toolbar row so they share
     one sticky region at the top of the viewport when scrolling. */
  .site-chrome {
    position: sticky; top: 0; z-index: 10;
    padding: 20px 24px 12px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(6px);
  }
  header { padding: 0; border-bottom: 0; background: transparent; }
  header .topline { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  header h1 { margin: 0 0 4px 0; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  header .stats { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
  .controls { display: flex; gap: 8px; align-items: center; }
  .controls + .controls { margin-top: 8px; }
  .controls input[type="search"] { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; background: var(--card); color: var(--text); min-width: 0; }
  .controls input[type="search"]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  /* Buttons use --chip-bg (not --card) so they stand out from the input,
     which sits on --card. Hover shifts to --accent-soft — a warm tint
     that reads clearly on both light and dark themes. */
  .controls button { padding: 10px 14px; border: 1px solid var(--border); background: var(--chip-bg); color: var(--text); border-radius: 8px; cursor: pointer; font-size: 14px; }
  .controls button:hover { background: var(--accent-soft); border-color: var(--accent); }
  .themes { display: inline-flex; gap: 2px; padding: 3px; border: 1px solid var(--border); border-radius: 999px; background: var(--card); }
  .theme-btn {
    width: 28px; height: 28px; padding: 0; border: 0; background: transparent;
    border-radius: 999px; cursor: pointer; font-size: 15px; line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.15s; color: var(--text);
  }
  .theme-btn:hover { background: var(--chip-bg); transform: scale(1.05); }
  .theme-btn.active { background: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  header .topline-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  header .version,
  header .report-link {
    color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums;
    border: 1px solid var(--border); padding: 3px 10px; border-radius: 999px;
    background: var(--card); white-space: nowrap; text-decoration: none;
  }
  header .report-link:hover { color: var(--accent); border-color: var(--accent); }
  .tagcloud { padding: 10px 24px 14px; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; background: var(--bg); max-height: 140px; overflow-y: auto; transition: max-height 0.2s; }
  .tagcloud.expanded { max-height: 400px; }
  .tag {
    background: var(--chip-bg); color: var(--text); border: 1px solid transparent;
    padding: 4px 10px; border-radius: 999px; font-size: 12px; cursor: pointer;
    font-weight: 500; white-space: nowrap;
  }
  .tag:hover { border-color: var(--accent); }
  .tag.active { background: var(--chip-active-bg); color: var(--chip-active-text); }
  .tag .n { opacity: 0.6; margin-left: 4px; font-weight: 400; }
  .tagcloud-toggle { margin-left: auto; align-self: flex-start; padding: 4px 12px; font-size: 12px; font-weight: 500; cursor: pointer; background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 999px; }
  .tagcloud-toggle:hover { border-color: var(--accent); color: var(--accent); }
  main { padding: 16px 24px 64px; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
  .camp {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; display: flex; flex-direction: column; gap: 8px;
  }
  .camp .camp-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 8px;
  }
  .camp .camp-head h3 { flex: 1; min-width: 0; word-break: break-word; }
  .camp h3 { margin: 0; font-size: 16px; font-weight: 600; }
  /* Favorite star on each card */
  .fav-btn {
    width: 36px; height: 36px; flex-shrink: 0; padding: 0; border: 0;
    background: transparent; cursor: pointer; font-size: 22px; line-height: 1;
    color: var(--muted); border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: color 0.15s, background 0.15s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .fav-btn:hover, .fav-btn:focus-visible { background: var(--chip-bg); transform: scale(1.08); outline: none; }
  .fav-btn.active { color: #f59e0b; }           /* star-gold, readable on every theme */
  .fav-btn.active:hover { color: #fbbf24; }
  /* Favorites-only filter toggle — in the controls row */
  .fav-filter {
    padding: 10px 14px; border: 1px solid var(--border);
    background: var(--chip-bg); color: var(--text);
    border-radius: 8px; cursor: pointer; font-size: 14px;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .fav-filter:hover { border-color: var(--accent); background: var(--accent-soft); }
  .fav-filter.active {
    background: #f59e0b; border-color: #f59e0b; color: #1a1a1a; font-weight: 500;
  }
  .fav-filter.active:hover { background: #fbbf24; border-color: #fbbf24; }
  .fav-filter .count { opacity: 0.7; margin-left: 4px; font-variant-numeric: tabular-nums; }
  /* Second controls row: filters-left, actions-right. The margin-left:auto
     on .actions pushes it to the far right; flex-wrap keeps things sane on
     narrow viewports (actions wrap under filters, not next to them). */
  .controls.toolbar-row { margin-top: 8px; gap: 8px; flex-wrap: wrap; }
  .controls.toolbar-row .filters,
  .controls.toolbar-row .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .controls.toolbar-row .actions { margin-left: auto; }
  .fav-clear {
    padding: 10px 14px; border: 1px solid var(--border);
    background: var(--chip-bg); color: var(--muted);
    border-radius: 8px; cursor: pointer; font-size: 14px;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .fav-clear:hover { border-color: #c2410c; color: #c2410c; background: var(--accent-soft); }
  .fav-clear.hidden { display: none; }
  .camp .meta { font-size: 12px; color: var(--muted); display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .camp .meta a { color: var(--accent); text-decoration: none; }
  .camp .meta a:hover { text-decoration: underline; }
  .camp .desc { margin: 0; font-size: 14px; color: var(--text); }
  .camp .desc.empty { color: var(--muted); font-style: italic; }
  .camp .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tagbadge { background: var(--chip-bg); color: var(--muted); padding: 2px 8px; border-radius: 999px; font-size: 11px; cursor: pointer; }
  .tagbadge:hover { background: var(--accent-soft); color: var(--accent); }
  details.events { margin-top: 2px; border-top: 1px dashed var(--border); padding-top: 8px; font-size: 13px; }
  details.events summary { cursor: pointer; color: var(--muted); font-size: 12px; user-select: none; }
  details.events summary:hover { color: var(--accent); }
  details.events ul { margin: 8px 0 0; padding: 0 0 0 2px; list-style: none; display: flex; flex-direction: column; gap: 8px; }
  details.events li { border-left: 2px solid var(--accent-soft); padding-left: 8px; }
  details.events .evname { font-weight: 600; font-size: 13px; color: var(--text); text-decoration: none; }
  details.events a.evname:hover { color: var(--accent); }
  details.events .ev-ext { opacity: 0.45; font-size: 10px; margin-left: 3px; }
  details.events a.evname:hover .ev-ext { opacity: 1; color: var(--accent); }
  details.events .evtime { color: var(--muted); font-size: 11px; display: block; margin-top: 1px; }
  details.events .evdesc { margin: 4px 0 0 0; color: var(--text); font-size: 13px; }
  details.events .ev-head {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 6px;
  }
  details.events .ev-head a.evname { flex: 1; min-width: 0; word-break: break-word; }
  .ev-fav {
    width: 28px; height: 28px; flex-shrink: 0; padding: 0; border: 0;
    background: transparent; cursor: pointer; font-size: 16px; line-height: 1;
    color: var(--muted); border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: color 0.15s, background 0.15s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .ev-fav:hover, .ev-fav:focus-visible { background: var(--chip-bg); transform: scale(1.12); outline: none; }
  .ev-fav.active { color: #f59e0b; }
  .ev-fav.active:hover { color: #fbbf24; }
  .empty-state { grid-column: 1/-1; text-align: center; color: var(--muted); padding: 40px 0; font-style: italic; }
  .more { grid-column: 1/-1; text-align: center; padding: 18px; color: var(--muted); font-size: 13px; background: var(--card); border: 1px dashed var(--border); border-radius: 8px; }
  mark { background: var(--mark-bg); color: var(--mark-text); padding: 0 1px; border-radius: 2px; }
  .camp .meta .canonical { color: var(--muted); }
  .camp .meta .canonical:hover { color: var(--accent); }
  /* "About & disclaimer" button in the header */
  .info-btn {
    width: 28px; height: 28px; padding: 0;
    border: 1px solid var(--border); background: var(--card); color: var(--text);
    border-radius: 999px; cursor: pointer; font-size: 15px; font-weight: 600;
    line-height: 1; display: inline-flex; align-items: center; justify-content: center;
    font-family: Georgia, "Times New Roman", serif; font-style: italic;
  }
  .info-btn:hover { border-color: var(--accent); color: var(--accent); }
  .info-btn.pulse { animation: info-pulse 1.4s ease-out 3; }
  @keyframes info-pulse {
    0%   { box-shadow: 0 0 0 0 var(--accent); }
    60%  { box-shadow: 0 0 0 10px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  /* Modal (shared — info-modal, could host others later) */
  .modal {
    position: fixed; inset: 0; z-index: 90;
    display: flex; align-items: center; justify-content: center;
    padding: 20px; background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
  }
  .modal-hidden { display: none !important; }
  .modal-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; max-width: 560px; width: 100%;
    max-height: 82vh; overflow-y: auto; color: var(--text);
    box-shadow: 0 8px 40px rgba(0,0,0,0.25);
  }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 10px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--card);
  }
  .modal-head h2 { margin: 0; font-size: 16px; font-weight: 600; }
  .modal-close {
    width: 30px; height: 30px; padding: 0; border: 0;
    background: transparent; color: var(--muted); cursor: pointer;
    font-size: 18px; line-height: 1; border-radius: 999px;
  }
  .modal-close:hover { background: var(--chip-bg); color: var(--text); }
  .modal-body { padding: 14px 20px 20px; font-size: 13.5px; line-height: 1.55; }
  .modal-body p { margin: 0 0 10px; color: var(--text); }
  .modal-body p:last-child { margin-bottom: 0; }
  .modal-body a { color: var(--accent); text-decoration: none; }
  .modal-body a:hover { text-decoration: underline; }
  .modal-body .warn { display: inline-block; background: var(--mark-bg); color: var(--mark-text); padding: 1px 7px; border-radius: 4px; font-weight: 600; margin-right: 4px; }
  .modal-body .badge { display: inline-block; background: var(--chip-bg); color: var(--text); padding: 2px 8px; border-radius: 999px; font-weight: 500; margin-right: 6px; font-size: 12px; }
  .modal-body .footnote { color: var(--muted); font-size: 12px; margin-top: 14px; }
  .modal-body .danger-btn {
    padding: 6px 12px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); border-radius: 6px;
    cursor: pointer; font-size: 12px; margin-left: 4px; white-space: nowrap;
  }
  .modal-body .danger-btn:hover { border-color: #c2410c; color: #c2410c; }
  footer.site-footer {
    padding: 24px 24px 40px; margin-top: 8px; border-top: 1px solid var(--border);
    color: var(--muted); font-size: 12px; line-height: 1.55;
    background: var(--card);
  }
  footer.site-footer .col { max-width: 780px; margin: 0 auto; }
  footer.site-footer p { margin: 0 0 8px; }
  footer.site-footer a { color: var(--accent); text-decoration: none; }
  footer.site-footer a:hover { text-decoration: underline; }
  footer.site-footer .badge { display: inline-block; background: var(--chip-bg); color: var(--text); padding: 2px 8px; border-radius: 999px; font-weight: 500; margin-right: 6px; }
  /* Password gate (shown only when content is encrypted) */
  .gate {
    position: fixed; inset: 0; z-index: 100; display: flex;
    align-items: center; justify-content: center; padding: 20px;
    background: var(--bg);
  }
  .gate-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 28px 28px 24px; max-width: 420px; width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .gate-card h2 { margin: 0 0 8px; font-size: 18px; }
  .gate-card p { margin: 0 0 16px; color: var(--muted); font-size: 13px; line-height: 1.5; }
  .gate-card form { display: flex; gap: 8px; }
  .gate-card input {
    flex: 1; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 15px; background: var(--bg); color: var(--text);
  }
  .gate-card input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .gate-card button {
    padding: 10px 16px; border: 0; background: var(--accent); color: #fff;
    border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500;
  }
  .gate-card button:hover { filter: brightness(1.05); }
  .gate-card .err { color: #c2410c; font-size: 12px; margin-top: 10px; min-height: 1em; }
  .gate-hidden { display: none !important; }
  .main-hidden > header, .main-hidden > #tagcloud, .main-hidden > main, .main-hidden > footer.site-footer { visibility: hidden; }
  @media (max-width: 600px) {
    .site-chrome { padding: 14px 14px 10px; }
    .tagcloud { padding: 10px 14px; }
    main { padding: 12px 14px 48px; }
    footer.site-footer { padding: 20px 14px 32px; }
  }
</style>
<script>
  // Apply saved theme before body renders, to avoid flash of wrong theme.
  try {
    var t = localStorage.getItem('bm-theme') || 'paper';
    document.documentElement.setAttribute('data-theme', t);
  } catch (e) {}
</script>
</head>
<body>

<!-- Preact mounts the entire app here. Everything else — gate, header,
     toolbar, tag cloud, cards, modal, footer — is rendered by bundle.js.
     The <style> block + early theme-apply script stay in this shell so
     the page has styling before the bundle boots. -->
<div id="app"></div>

__DATA_SCRIPT__
<script>__BUNDLE__</script>

</body>
</html>
